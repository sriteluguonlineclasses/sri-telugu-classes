name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Stage site files only
        run: |
          mkdir _site
          cp index.html login.html dashboard.html 404.html admin.html _site/
          cp styles.css main.js app.js students-data.js calendar-ics.js _site/
          cp favicon.svg favicon-32.png apple-touch-icon.png og-image.png hero-scene.svg _site/
          cp manifest.webmanifest sw.js icon-192.png icon-512.png icon-maskable-512.png _site/
          cp robots.txt sitemap.xml _site/
          if [ -d calendars ]; then cp -r calendars _site/; fi

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
